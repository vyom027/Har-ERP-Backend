{% extends 'base.html' %}

{% block title %}Record Payment | Har Apperals{% endblock %}
{% block header_title %}New Payment Entry{% endblock %}

{% block main_content %}
<div class="max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
    <!-- Flash Messages -->
    {% if messages %}
    <div class="mb-6 space-y-2">
        {% for message in messages %}
        <div class="p-4 rounded-xl flex items-center gap-3 
            {% if message.tags == 'error' %}bg-rose-50 text-rose-700 border border-rose-100
            {% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="font-bold text-sm">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="surface-card p-10 rounded-[2rem] shadow-premium">
        <form method="post" class="space-y-8">
            {% csrf_token %}
            
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Select Worker</label>
                <select name="labor_id" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-medium appearance-none cursor-pointer">
                    <option value="">Choose a worker...</option>
                    {% for labor in labors %}
                    <option value="{{ labor.id }}" class="text-slate-900 bg-white" 
                        {% if selected_labor.id == labor.id or request.GET.labor_id == labor.id|stringformat:"i" %}selected{% endif %}>
                        {{ labor.name }} (Bal: ₹{{ labor.pending_balance }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Amount (₹)</label>
                    <input type="number" name="amount" placeholder="0.00" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-bold text-lg">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Payment Date</label>
                    <input type="date" name="payment_date" value="{% now 'Y-m-d' %}" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-medium">
                </div>
            </div>

            <!-- Default to Cash (Hidden) -->
            <input type="hidden" name="payment_type" value="cash">

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Notes / Reference (Optional)</label>
                <textarea name="note" rows="3" placeholder="Any additional notes..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all"></textarea>
            </div>

            <div class="pt-4 flex items-center gap-4">
                <a href="{% url 'labor:payment_list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-5 rounded-2xl text-center transition-all btn-press">
                    Cancel
                </a>
                <button type="submit" class="flex-[2] bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-5 px-12 rounded-2xl shadow-xl shadow-emerald-500/20 transition-all btn-press">
                    Confirm Payment Entry
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
