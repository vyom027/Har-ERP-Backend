{% extends 'base.html' %}

{% block title %}Register Worker | Har Apperals{% endblock %}
{% block header_title %}Register New Worker{% endblock %}

{% block main_content %}
<div class="max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="surface-card p-8 rounded-3xl shadow-premium">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Worker Name</label>
                <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Phone Number</label>
                <input type="text" name="phone" placeholder="+91 00000 00000" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
            </div>

            <div class="flex gap-4 pt-4">
                <a href="{% url 'labor:labor_list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl text-center transition-all btn-press">
                    Cancel
                </a>
                <button type="submit" class="flex-[2] bg-primary hover:bg-sky-700 text-white font-bold py-4 px-12 rounded-2xl shadow-xl shadow-primary/20 transition-all btn-press">
                    Register Worker
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
