<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Har Apperals{% endblock %}</title>
    {% load static %}
    <script src="{% static 'vendor/tailwind.js' %}"></script>
    <script src="{% static 'vendor/htmx.min.js' %}"></script>
    <script src="{% static 'vendor/alpine.min.js' %}" defer></script>
    <script src="{% static 'vendor/chart.min.js' %}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ease-out: cubic-bezier(0.23, 1, 0.32, 1); --primary: #0ea5e9; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
        [x-cloak] { display: none !important; }
        .btn-press { transition: transform 150ms var(--ease-out); }
        .btn-press:active { transform: scale(0.96); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .sidebar-item { transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out); }
        .sidebar-item:hover { background: #f1f5f9; transform: translateX(2px); }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', surface: '#ffffff', background: '#f8fafc' },
                }
            }
        };

        window.parseB64 = function(b64) {
            try { return JSON.parse(atob(b64.trim().replace(/^['"](.*)['"]$/, '$1'))); } catch(e) { return {}; }
        };

        window.initQuickAdd = function() {
            return {
                lotId: '', opId: '', colorId: '0', workerId: '', pieces: '', rate: '', touched: false, colors: [], limits: {},
                async fetchLot() {
                    if (!this.lotId) { this.colors = []; this.limits = {}; this.colorId = '0'; return; }
                    try {
                        let res = await fetch(`/production/get-lot-data/?lot_id=${this.lotId}`);
                        let data = await res.json();
                        this.colors = data.colors || []; 
                        this.limits = data.limits || {}; 
                        this.colorId = '0';
                    } catch(e) { console.error('Error:', e); }
                },
                get limitData() {
                    if (!this.opId || !this.limits[this.opId]) return { total: 0, allotted: 0 };
                    if (this.colorId === 'all') {
                        let total = 0; let allotted = 0;
                        for (let id in this.limits[this.opId]) {
                            if (id !== 'all') {
                                total += parseInt(this.limits[this.opId][id].total) || 0;
                                allotted += parseInt(this.limits[this.opId][id].allotted) || 0;
                            }
                        }
                        return { total, allotted };
                    }
                    return this.limits[this.opId][this.colorId] || { total: 0, allotted: 0 };
                },
                get isOver() { 
                    if (this.colorId === 'all') return false;
                    return (parseInt(this.pieces) || 0) > (parseInt(this.limitData.total) - parseInt(this.limitData.allotted));
                },
                get canSave() { return this.lotId && this.opId && this.workerId && (parseInt(this.pieces) > 0) && (parseFloat(this.rate) > 0) && !this.isOver; }
            };
        };

        window.initWorkEntry = function(limitsB64, initialColor, initialPieces, initialRate) {
            const limits = window.parseB64(limitsB64);
            return {
                colorId: initialColor || '0', pieces: initialPieces || '', rate: initialRate || '',
                touchedP: false, touchedR: false, limits: limits,
                get limitData() {
                    if (this.colorId === 'all') {
                        let total = 0; let allotted = 0;
                        for (let id in this.limits) {
                            total += parseInt(this.limits[id].total) || 0;
                            allotted += parseInt(this.limits[id].allotted) || 0;
                        }
                        return { total, allotted };
                    }
                    return this.limits[this.colorId] || { total: 0, allotted: 0 };
                },
                get isOver() {
                    if (this.colorId === 'all') return false;
                    return (parseInt(this.pieces) || 0) > (parseInt(this.limitData.total) - parseInt(this.limitData.allotted));
                },
                get canSave() { return (parseInt(this.pieces) > 0) && (parseFloat(this.rate) > 0) && !this.isOver; }
            };
        };

    </script>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="flex h-screen overflow-hidden" x-data="{ sidebarOpen: true }">
        <!-- Sidebar -->
        <aside class="bg-white border-r border-slate-200 w-64 flex-shrink-0 flex flex-col transition-all duration-300" :class="sidebarOpen ? 'ml-0' : '-ml-64'">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20"><span class="text-xl font-bold text-white">HA</span></div>
                <h1 class="text-xl font-bold text-slate-900 font-display">Har Apperals</h1>
            </div>
            <nav class="flex-1 px-4 space-y-1.5 mt-4 overflow-y-auto custom-scrollbar">
                <a href="{% url 'dashboard:home' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'dashboard' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span>Dashboard</span></a>
                <a href="{% url 'production:table' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'production' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg><span>Production</span></a>
                <a href="{% url 'samples:list' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'samples' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.183.394l-1.43.904a2 2 0 01-2.927-1.347l-.146-.638A2 2 0 012.33 12.4l.208-.064a2 2 0 001.353-1.32l.243-.65a2 2 0 012.656-1.144l.65.243a2 2 0 002.32-.51l.487-.604a2 2 0 013.111 0l.487.604a2 2 0 002.32.51l.65-.243a2 2 0 012.656 1.144l.243.65a2 2 0 001.353 1.32l.208.064a2 2 0 011.393 2.107l-.146.638a2 2 0 01-2.927 1.347l-1.43-.904z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span>Samples</span></a>
                <a href="{% url 'core:lot_list' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'lot_list' or request.resolver_match.url_name == 'lot_detail' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg><span>Lots</span></a>
                <a href="{% url 'core:party_list' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'party_list' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span>Parties</span></a>
                <a href="{% url 'labor:labor_list' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'labor_list' or request.resolver_match.url_name == 'labor_profile' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><span>Labor</span></a>
                <a href="{% url 'labor:payment_list' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'payment_list' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span>Payments</span></a>
                <a href="{% url 'reports:home' %}" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'reports' %}active text-white{% endif %}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg><span>Reports</span></a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-all duration-200 btn-press"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span>Logout</span></button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-background">
            <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8 z-10">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 btn-press"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                    <div class="h-6 w-px bg-slate-200 mx-2"></div>
                    <button onclick="window.history.back()" class="p-2 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-primary transition-colors btn-press group" title="Go Back"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>
                    <h2 class="text-lg font-semibold text-slate-900 font-display">{% block header_title %}Dashboard{% endblock %}</h2>
                </div>
                <div class="flex items-center gap-4"><div class="text-right"><p class="text-sm font-semibold text-slate-900">{{ user.username|title }}</p><p class="text-xs text-slate-500">Administrator</p></div><div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-primary font-bold border border-slate-200">{{ user.username.0|upper }}</div></div>
            </header>
            <div id="main-content-area" class="flex-1 overflow-y-auto custom-scrollbar p-8">{% block main_content %}{% endblock %}</div>
        </main>
    </div>

    <!-- Global Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-[2px]" x-data="{ open: false }" x-show="open" x-cloak @open-modal.window="open = true" @close-modal.window="open = false" @keydown.window.escape="open = false" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
        <div class="bg-white max-w-2xl w-full mx-4 rounded-2xl shadow-2xl overflow-hidden border border-slate-200" @click.away="open = false" x-show="open" x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="scale-95 opacity-0" x-transition:enter-end="scale-100 opacity-100">
            <div id="modal-container-inner" hx-target="this">
                <div id="modal-content"><div class="flex items-center justify-center p-12 htmx-indicator"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        document.body.addEventListener('htmx:afterSwap', function (evt) {
            if (evt.detail.target.id === 'modal-content') {
                if (window.Alpine) {
                    Alpine.initTree(document.getElementById('modal-container-inner'));
                }
            }
        });
    </script>
</body>
</html>
