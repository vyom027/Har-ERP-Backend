<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Har Apperals{% endblock %}</title>
    {% load static %}
    <script src="{% static 'vendor/tailwind.js' %}"></script>
    <script src="{% static 'vendor/htmx.min.js' %}"></script>
    <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
    <script src="{% static 'vendor/chart.min.js' %}"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
            --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .surface-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
        }

        .sidebar-item {
            transition: transform 150ms var(--ease-out), background-color 150ms var(--ease-out);
        }

        .sidebar-item:hover {
            background: #f1f5f9;
            transform: translateX(2px);
        }

        .sidebar-item:active {
            transform: scale(0.98);
        }

        .sidebar-item.active {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        .btn-press {
            transition: transform 150ms var(--ease-out);
        }

        .btn-press:active {
            transform: scale(0.96);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        [hx-indicator].htmx-request {
            opacity: 0.6;
            pointer-events: none;
        }

        [x-cloak] {
            display: none !important;
        }

        /* =====================================================
           MODAL FORM STYLES
           All defined here because Tailwind CDN doesn't scan
           HTMX-injected content. These replace Tailwind classes.
           ===================================================== */
        .modal-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .modal-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        /* Modal container padding */
        [x-data="quickAddModalData()"] {
            padding: 2rem;
        }

        /* Form field spacing */
        [x-data="quickAddModalData()"] .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        [x-data="quickAddModalData()"] .form-body {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Field labels */
        [x-data="quickAddModalData()"] label {
            display: block;
            font-size: 0.625rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-left: 0.25rem;
            margin-bottom: 0.375rem;
        }

        /* Inputs and selects */
        [x-data="quickAddModalData()"] input,
        [x-data="quickAddModalData()"] select,
        [x-data="quickAddModalData()"] textarea {
            width: 100%;
            background: rgba(248, 250, 252, 0.8);
            border: 1.5px solid rgba(226, 232, 240, 0.8);
            border-radius: 0.75rem;
            padding: 0.625rem 1rem;
            color: #0f172a;
            font-size: 0.875rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }

        [x-data="quickAddModalData()"] input:focus,
        [x-data="quickAddModalData()"] select:focus,
        [x-data="quickAddModalData()"] textarea:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        [x-data="quickAddModalData()"] input::placeholder,
        [x-data="quickAddModalData()"] textarea::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        [x-data="quickAddModalData()"] textarea {
            resize: none;
            height: 2.75rem;
        }

        /* Color info text */
        [x-data="quickAddModalData()"] .pieces-hint {
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            margin-top: 0.3rem;
            letter-spacing: 0.02em;
            background: #f1f5f9;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            display: block;
        }

        /* No-color placeholder box */
        .no-color-box {
            display: flex;
            align-items: center;
            padding: 0.625rem 1rem;
            background: rgba(241, 245, 249, 0.5);
            border-radius: 0.75rem;
            border: 1.5px solid rgba(226, 232, 240, 0.4);
        }

        .no-color-box p {
            font-size: 0.625rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Header section */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            font-family: 'Outfit', sans-serif;
        }

        .modal-header p {
            color: #64748b;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .modal-close-btn {
            padding: 0.5rem;
            color: #94a3b8;
            border-radius: 0.75rem;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .modal-close-btn:hover {
            background: #f1f5f9;
            color: #475569;
        }

        /* Footer buttons */
        .modal-footer {
            display: flex;
            gap: 0.75rem;
            padding-top: 0.5rem;
        }

        .btn-cancel {
            flex: 1;
            background: #f1f5f9;
            color: #374151;
            font-weight: 700;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.9rem;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .btn-save {
            flex: 2;
            background: #0ea5e9;
            color: white;
            font-weight: 700;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-save:hover {
            background: #0284c7;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',    /* Sky 500 */
                        secondary: '#0d9488',  /* Teal 600 */
                        accent: '#f59e0b',     /* Amber 500 */
                        surface: '#ffffff',
                        background: '#f8fafc',
                    },
                    boxShadow: {
                        'premium': '0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="flex h-screen overflow-hidden" x-data="{ sidebarOpen: true }">
        <!-- Sidebar -->
        <aside class="bg-surface border-r border-slate-200 w-64 flex-shrink-0 flex flex-col transition-all duration-300"
            :class="sidebarOpen ? 'ml-0' : '-ml-64'">
            <div class="p-6 flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="text-xl font-bold text-white">HA</span>
                </div>
                <h1 class="text-xl font-bold text-slate-900 font-display">Har Apperals</h1>
            </div>

            <nav class="flex-1 px-4 space-y-1.5 mt-4 overflow-y-auto custom-scrollbar">
                <a href="{% url 'dashboard:home' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'dashboard' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="{% url 'production:table' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'production' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    <span>Production</span>
                </a>
                <a href="{% url 'core:lot_list' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'lot_list' or request.resolver_match.url_name == 'add_lot' or request.resolver_match.url_name == 'lot_detail' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    <span>Lots</span>
                </a>
                <a href="{% url 'core:party_list' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'party_list' or request.resolver_match.url_name == 'edit_party' or request.resolver_match.url_name == 'add_party' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z">
                        </path>
                    </svg>
                    <span>Parties</span>
                </a>
                <a href="{% url 'labor:labor_list' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'labor_list' or request.resolver_match.url_name == 'labor_profile' or request.resolver_match.url_name == 'add_labor' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    <span>Labor</span>
                </a>
                <a href="{% url 'labor:payment_list' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.url_name == 'payment_list' or request.resolver_match.url_name == 'add_payment' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                    <span>Payments</span>
                </a>
                <a href="{% url 'reports:home' %}"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium {% if request.resolver_match.app_name == 'reports' %}active text-white{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    <span>Reports</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-all duration-200 btn-press">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                        <span>Logout</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-background">
            <!-- Header -->
            <header class="bg-surface border-b border-slate-200 h-16 flex items-center justify-between px-8 z-10">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen"
                        class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 btn-press">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <div class="h-6 w-px bg-slate-200 mx-2"></div>
                    <button onclick="window.history.back()"
                        class="p-2 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-primary transition-colors btn-press group"
                        title="Go Back">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </button>
                    <h2 class="text-lg font-semibold text-slate-900 font-display">{% block header_title %}Dashboard{%
                        endblock %}</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-sm font-semibold text-slate-900">{{ user.username|title }}</p>
                        <p class="text-xs text-slate-500">Administrator</p>
                    </div>
                    <div
                        class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-primary font-bold border border-slate-200">
                        {{ user.username.0|upper }}
                    </div>
                </div>
            </header>

            <!-- Scrollable Page Content -->
            <div id="main-content-area" class="flex-1 overflow-y-auto custom-scrollbar p-8">
                {% block main_content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Global Modal Container -->
    <div id="modal-container"
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-[2px]"
        x-data="{ open: false }" x-show="open" x-cloak @open-modal.window="open = true"
        @close-modal.window="open = false" @keydown.window.escape="open = false"
        x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
        <div class="bg-surface max-w-2xl w-full mx-4 rounded-2xl shadow-2xl overflow-hidden border border-slate-200"
            @click.away="open = false" x-show="open" x-transition:enter="transition ease-out duration-300 transform"
            x-transition:enter-start="scale-95 opacity-0" x-transition:enter-end="scale-100 opacity-100">
            <div id="modal-content">
                <!-- Loading State -->
                <div class="flex items-center justify-center p-12 htmx-indicator">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ensure Alpine processes content swapped by HTMX
        document.body.addEventListener('htmx:afterSwap', function (evt) {
            if (evt.detail.target.id === 'modal-content' || evt.detail.target.closest('#table-container')) {
                if (window.Alpine) {
                    Alpine.discoverUninitializedComponents((el) => {
                        Alpine.nextTick(() => Alpine.process(el));
                    });
                }
            }
        });
    </script>
</body>

</html>
