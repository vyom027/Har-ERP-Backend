{% extends 'base.html' %}

{% block title %}Edit Party | Har Apperals{% endblock %}
{% block header_title %}Edit Party{% endblock %}

{% block main_content %}
<div class="max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="surface-card p-10 rounded-[2rem] shadow-premium">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Party / Buyer Name</label>
                <input type="text" name="name" value="{{ party.name }}" required
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 font-bold focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-lg">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Phone</label>
                    <input type="text" name="phone" value="{{ party.phone|default:'' }}"
                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Address</label>
                    <input type="text" name="address" value="{{ party.address|default:'' }}"
                           class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Notes (Optional)</label>
                <textarea name="notes" rows="3"
                          class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">{{ party.notes|default:'' }}</textarea>
            </div>

            <div class="pt-2 flex items-center gap-4">
                <a href="{% url 'core:party_list' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl text-center transition-all btn-press">
                    Cancel
                </a>
                <button type="submit" class="flex-[2] bg-primary hover:bg-sky-700 text-white font-bold py-4 px-12 rounded-2xl shadow-xl shadow-primary/20 transition-all btn-press">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
