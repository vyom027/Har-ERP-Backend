<div class="modal-form-body" x-data="initQuickAdd()">
    <!-- Header -->
    <div class="modal-header-box">
        <div>
            <h3 class="font-display">Quick Work Entry</h3>
            <p class="text-slate-500 text-[11px] font-bold uppercase tracking-wider">Record production for any active lot</p>
        </div>
        <button @click="open = false" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl transition-all btn-press">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <form hx-post="{% url 'production:save_entry' %}" 
          hx-target="#production-spreadsheet-wrapper"
          hx-swap="none"
          @htmx:after-request="if (event.detail.successful) { open = false; window.location.reload() }">
        {% csrf_token %}
        
        <div class="modal-form-body p-0">
            <!-- Row 1: Lot & Color -->
            <div class="modal-grid grid-2">
                <div class="field-group">
                    <label class="modal-label">Select Lot</label>
                    <select name="lot_id" x-model="lotId" @change="fetchLot()" required class="modal-select">
                        <option value="">Choose Lot...</option>
                        {% for lot in lots %}
                        <option value="{{ lot.id }}">{{ lot.lot_number }} ({{ lot.party.name }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field-group">
                    <label class="modal-label">Color Breakdown</label>
                    <template x-if="colors.length > 0">
                        <select name="color_id" x-model="colorId" class="modal-select">
                            <option value="0">General / No Color</option>
                            <template x-for="color in colors" :key="color.id">
                                <option :value="color.id" x-text="`${color.name} (${color.pieces} pcs)`"></option>
                            </template>
                        </select>
                    </template>
                    <template x-if="colors.length === 0">
                        <div class="no-color-box-premium">
                            <input type="hidden" name="color_id" value="0">
                            <p>Select a lot first</p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Row 2: Operation & Worker -->
            <div class="modal-grid grid-2">
                <div class="field-group">
                    <label class="modal-label">Operation</label>
                    <select name="op_id" x-model="opId" required class="modal-select">
                        <option value="">Choose Operation...</option>
                        {% for op in operations %}
                        <option value="{{ op.id }}">{{ op.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field-group">
                    <label class="modal-label">Worker / Labor</label>
                    <select name="labor_id" x-model="workerId" required class="modal-select"
                            hx-get="{% url 'production:get_last_rate' %}"
                            hx-trigger="change"
                            hx-swap="none"
                            hx-on::after-request="document.getElementById('rate-quick').value = event.detail.xhr.responseText"
                            hx-include="[name='op_id']"
                            hx-vals='js:{labor_id: event.target.value}'>
                        <option value="">Choose Worker...</option>
                        {% for labor in labors %}
                        <option value="{{ labor.id }}">{{ labor.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Row 3: Numbers -->
            <div class="modal-grid grid-3">
                <div class="field-group">
                    <div class="flex items-center justify-between px-1">
                        <label class="modal-label">Pieces</label>
                        <span class="capacity-badge" :class="isOver ? 'error' : ''">
                            Tot: <span x-text="limitData.total"></span> | All: <span x-text="limitData.allotted"></span>
                        </span>
                    </div>
                    <input type="number" name="pieces" x-model="pieces" @input="touched = true" placeholder="0" required 
                           class="modal-input" :class="(touched && isOver) ? 'input-error-premium' : ''">
                    <p x-show="touched && isOver" class="text-[9px] font-bold text-rose-500 mt-1 ml-1 animate-pulse">⚠️ Exceeds capacity!</p>
                </div>
                <div class="field-group">
                    <label class="modal-label">Size</label>
                    <input type="text" name="size" placeholder="e.g. 28" class="modal-input">
                </div>
                <div class="field-group">
                    <label class="modal-label">Rate (₹)</label>
                    <input type="number" step="0.01" name="rate" id="rate-quick" placeholder="0.00" required class="modal-input">
                </div>
            </div>

            <!-- Row 4: Meta -->
            <div class="modal-grid grid-2">
                <div class="field-group">
                    <label class="modal-label">Work Date</label>
                    <input type="date" name="work_date" value="{% now 'Y-m-d' %}" required class="modal-input">
                </div>
                <div class="field-group">
                    <label class="modal-label">Remarks</label>
                    <textarea name="remarks" placeholder="Notes..." class="modal-textarea"></textarea>
                </div>
            </div>

            <!-- Footer -->
            <div class="flex items-center gap-3 mt-4">
                <button type="button" @click="open = false" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-all btn-press text-sm">Cancel</button>
                <button type="submit" :disabled="!canSave" class="btn-premium-save flex-[2] text-sm">
                    <span class="htmx-indicator animate-spin w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
                    Save Production
                </button>
            </div>
        </div>
    </form>
</div>
