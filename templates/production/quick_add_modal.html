<div x-data="quickAddModalData()">
    <div class="modal-header">
        <div>
            <h3>Quick Work Entry</h3>
            <p>Record production for any active lot</p>
        </div>
        <button type="button" @click="open = false" class="modal-close-btn">
            <svg style="width:1.5rem;height:1.5rem" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <form hx-post="{% url 'production:save_entry' %}" 
          hx-target="#production-table-reload-trigger"
          hx-swap="none"
          @htmx:after-request="if (event.detail.successful && event.detail.pathInfo.requestPath.includes('save')) { open = false; window.location.reload() }"
          class="form-body">
        {% csrf_token %}
        
        <!-- Row 1: Lot & Color -->
        <div class="modal-grid-2">
            <div class="field-group">
                <label>Select Lot</label>
                <select name="lot_id" x-model="lotId" @change="fetchLotData()" required>
                    <option value="">Choose Lot...</option>
                    {% for lot in lots %}
                    <option value="{{ lot.id }}">{{ lot.lot_number }} ({{ lot.party.name }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field-group">
                <label>Select Color</label>
                <template x-if="colors.length > 0">
                    <select name="color_id" x-model="colorId">
                        <option value="all">General (No Color Selection)</option>
                        <template x-for="color in colors" :key="color.id">
                            <option :value="color.id" x-text="`${color.name} (${color.pieces} pcs)`"></option>
                        </template>
                    </select>
                </template>
                <template x-if="colors.length === 0">
                    <div>
                        <input type="hidden" name="color_id" value="all">
                        <div class="no-color-box">
                            <p>Standard Lot — No color needed</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Row 2: Operation & Worker -->
        <div class="modal-grid-2">
            <div class="field-group">
                <label>Operation</label>
                <select name="op_id" x-model="opId" required>
                    <option value="">Choose Operation...</option>
                    {% for op in operations %}
                    <option value="{{ op.id }}">{{ op.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field-group">
                <label>Worker / Labor</label>
                <select name="labor_id" id="labor-select-quick" x-model="workerId" required
                        hx-get="{% url 'production:get_last_rate' %}"
                        hx-trigger="change"
                        hx-swap="none"
                        hx-on::after-request="document.getElementById('rate-input-quick').value = event.detail.xhr.responseText"
                        hx-include="[name='op_id']"
                        hx-vals='js:{labor_id: event.target.value}'>
                    <option value="">Choose Worker...</option>
                    {% for labor in labors %}
                    <option value="{{ labor.id }}">{{ labor.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Row 3: Numbers -->
        <div class="modal-grid-3">
            <div class="field-group">
                <label>Pieces</label>
                <input type="number" name="pieces" placeholder="0" :max="currentLimit" required>
                <p class="pieces-hint" x-show="lotId" x-text="opId ? `Total: ${totalPieces}  |  Allocated: ${allotedPieces}  |  Remaining: ${currentLimit}` : `Select operation to see limits`"></p>
            </div>
            <div class="field-group">
                <label>Size</label>
                <input type="text" name="size" placeholder="e.g. 28">
            </div>
            <div class="field-group">
                <label>Rate (₹)</label>
                <input type="number" step="0.01" name="rate" id="rate-input-quick" placeholder="0.00" required>
            </div>
        </div>

        <!-- Row 4: Meta -->
        <div class="modal-grid-2">
            <div class="field-group">
                <label>Work Date</label>
                <input type="date" name="work_date" value="{% now 'Y-m-d' %}" required>
            </div>
            <div class="field-group">
                <label>Remarks</label>
                <textarea name="remarks" placeholder="Notes..."></textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button type="button" @click="open = false" class="btn-cancel">Cancel</button>
            <button type="submit" class="btn-save">
                <span class="htmx-indicator" style="display:inline-block;width:1rem;height:1rem;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite"></span>
                Save Production
            </button>
        </div>
    </form>
</div>
<div id="production-table-reload-trigger" style="display:none"></div>
