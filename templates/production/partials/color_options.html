{% if colors %}
<label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 animate-in fade-in duration-300">Select Color</label>
<select name="color_id" id="color-dropdown-quick" required 
        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all animate-in zoom-in-95 duration-300">
    <option value="all">General (No Color)</option>
    {% for color in colors %}
    <option value="{{ color.id }}">{{ color.color_name }} ({{ color.pieces }} pcs)</option>
    {% endfor %}
</select>
{% else %}
<!-- Hidden input for lots with no color breakdown -->
<input type="hidden" name="color_id" value="all">
<div class="flex items-center gap-2 py-4 px-4 bg-emerald-50 rounded-xl border border-emerald-100 animate-in slide-in-from-top-2 duration-300">
    <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Standard Lot (No color selection needed)</p>
</div>
{% endif %}
