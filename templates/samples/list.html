{% extends 'base.html' %}

{% block title %}Samples Management | Har Apperals{% endblock %}
{% block header_title %}Samples Section{% endblock %}

{% block main_content %}
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
    <!-- Header/Filter Bar -->
    <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/30">
        <div class="flex items-center gap-4">
            <div class="relative group">
                <input type="text" 
                       name="search" 
                       value="{{ search }}"
                       placeholder="Search Sample, Party, Labor..." 
                       class="bg-white border border-slate-200 rounded-xl px-10 py-2.5 text-sm focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none w-80 transition-all font-medium"
                       hx-get="{% url 'samples:list' %}"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#sample-table-container"
                       hx-push-url="true">
                <svg class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2 group-focus-within:text-primary transition-colors" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <button hx-get="{% url 'samples:sample_modal' %}" 
                hx-target="#modal-content" 
                @click="$dispatch('open-modal')"
                class="bg-primary hover:bg-primary-dark text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all btn-press flex items-center gap-2 shadow-lg shadow-primary/20">
            <svg class="w-4 h-4" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Add New Sample
        </button>
    </div>

    <!-- Table Container -->
    <div id="sample-table-container" class="flex-1 overflow-auto custom-scrollbar" hx-get="{% url 'samples:list' %}" hx-trigger="sampleUpdated from:body">
        {% include 'samples/partials/sample_table.html' %}
    </div>
</div>
{% endblock %}
